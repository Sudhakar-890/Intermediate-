<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Pro</title>
    <!-- styles -->
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/upperBody.css">
    <link rel="stylesheet" href="styles/lowerBody.css">

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>

<body>
    <header>
        <section id="headerBox">
            <div id="hamburger-menu-box">
                <img src="assets/menu-bar.png" alt="hamburger-menu" class="hamburger-menu">
            </div>
            <img id="logo" src="assets/smart-task-manager-pro-logo.png" alt="LOGO">
            <div id="appNameBox">
                <img src="assets/app-name-smart.png" alt="Smart" id="appName">
                <p id="floatName">task manager pro</p>
            </div>
        </section>
    </header>
    <main>
        <div id="searchBox">
            <div id="searchToggle">
                <h1 class="center-heading">
                    Task Pro
                </h1>
                <input type="search" placeholder="search">
            </div>
            <img id="searchIcon" src="assets/find.png" alt="search icon" />
        </div>
        <section id="center">
            <br>
            <center>
                <div id='inputBox'>
                    <input id="text" placeholder="Enter text here...">
                    <textarea id="description" placeholder="Description..."></textarea>
                    <input type='date'>
                    <input placeholder="hi" type="time" id="time" />
                    <select id="priority">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                    <br>
                    <button id="clearBtn">
                        Clear
                    </button>
                    <button id="addBtn">
                        Add Task
                    </button>
                </div>
            </center>
        </section>
    </main>
    <footer>
        <section id="menuPile">
            <a href="index.html">
            <div class="pileBox">
                <img class="pileLogo" src="assets/pile/task-edit.png" alt="" />
                <p id="pileText">task view</p>
            </div>
            </a>
            <a href="task-list.html">
            <div class="pileBox">
                <img class="pileLogo" src="assets/pile/task-list.png" alt="" />
                <p id="pileText">task list</p>
            </div>
            </a>
            <a href="settings.html">
            <div class="pileBox">
                <img class="pileLogo" src="assets/pile/settings.png" alt="" />
                <p id="pileText">settings</p>
            </div>
            </a>
        </section>
    </footer>
    <script type="text/javascript" charset="utf-8" src='scripts/animation.js'> </script>
    <script src="scripts/general.js"></script>
</body>

</html>
