<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Smart Task Pro</title>
 <!-- styles -->
 <link rel="stylesheet" href="styles/general.css">
 <link rel="stylesheet" href="styles/header.css">
 <link rel="stylesheet" href="styles/upperBody.css">
 <link rel="stylesheet" href="styles/lowerBody.css">
 
</head>

<body>
 <header>
  <section id="headerBox">
   <div id="hamburger-menu-box">
    <img src="assets/menu-bar.png" alt="hamburger-menu" class="hamburger-menu">
   </div>
   <img id="logo" src="assets/smart-task-manager-pro-logo.png" alt="LOGO">
   <div id="appNameBox">
    <img src="assets/app-name-smart.png" alt="Smart" id="appName">
    <p id="floatName">task manager pro</p>
   </div>
  </section>
 </header>
 <main>
  <div id="searchBox">
   <div id="searchToggle">
    <h1 class="center-heading">
     Task Pro
    </h1>
    <input type="search" placeholder="search">
   </div>
   <img id="searchIcon" src="assets/gifs/find.png" alt="search icon" />
  </div>
  <section id="center">
   <br>
   <center>
    <div id='inputBox' tabindex="0">
     <input id="text" tabindex="1" maxlength="15">
     <textarea id="description" tabindex="2" placeholder="Description..."></textarea>
     <input type='date' id="date" tabindex="3">
     <input type="time" id="time" tabindex="4">
     <select id="priority" tabindex="5">
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
     </select>
     <br>
     <button id="clearBtn" tabindex="6">
      Clear
     </button>
     <button id="addBtn" tabindex="7">
      Add Task
     </button>
     <!-- floating span -->
     <span id="textSpan">
      title (max 15 char)
      </span>
    </div>
   </center>
  </section>
 </main>
 <footer>
  <section id="menuPile">
   <a href="index.html">
    <div class="pileBox">
     <img class="pileLogo" src="assets/pile/task-edit.png" alt="" />
     <p id="pileText">task view</p>
    </div>
   </a>
   <a href="task-list.html">
    <div class="pileBox">
     <img class="pileLogo" src="assets/pile/task-list.png" alt="" />
     <p id="pileText">task list</p>
    </div>
   </a>
   <a href="settings.html">
    <div class="pileBox">
     <img class="pileLogo" src="assets/pile/settings.png" alt="" />
     <p id="pileText">settings</p>
    </div>
   </a>
  </section>
 </footer>
 <script src="scripts/general.js"></script>
 <script type="module" src="scripts/main.js"></script>
 <script type="module" src='scripts/animation.js'> </script>
</body>

</html>
