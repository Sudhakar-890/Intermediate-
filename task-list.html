<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/task-list/task-view.css">
    <link rel="stylesheet" href="styles/lowerBody.css">
</head>
<body>
    <header>
        <section id="headerBox">
            <div id="hamburger-menu-box">
                <img src="assets/menu-bar.png" alt="hamburger-menu" class="hamburger-menu">
            </div>
            <h1 >Task List</h1>
            <div id="appNameBox">
                <img src="assets/app-name-smart.png" alt="Smart" id="appName">
                <p id="floatName">task manager pro</p>
            </div>
        </section>
    </header>

    <main>
        <section id="mainBox">
            <!-- filters -->
            <div id="filterRow">
                <button class="filterBtn">All</button>
                <button class="filterBtn">Completed</button>
                <button class="filterBtn">Pending</button>
                <button class="filterBtn">Failed</button>
                <button class="filterBtn">Deleted</button>
            </div>

            <div id="taskListBox">
                <!-- priority bar -->
                <div id="priorityBox">
                    <div class="prior" id="high">
                        High
                    </div>
                    <div class="prior" id="medium">
                        Medium
                    </div>
                    <div class="prior" id="low">
                        Low
                    </div>
                </div>
                <div class="taskListDisplay">
                    <!-- tasks are rendered by js -->
                     <div class="taskBox">
                        
                     </div>
                </div>
            </div>

        </section>
    </main>


    <footer>
        <section id="menuPile">
            <a href="index.html">
            <div class="pileBox">
                <img class="pileLogo" src="assets/pile/task-edit.png" alt="" />
                <p id="pileText">task view</p>
            </div>
            </a>
            <a href="task-list.html">
            <div class="pileBox">
                <img class="pileLogo" src="assets/pile/task-list.png" alt="" />
                <p id="pileText">task list</p>
            </div>
            </a>
            <a href="settings.html">
            <div class="pileBox">
                <img class="pileLogo" src="assets/pile/settings.png" alt="" />
                <p id="pileText">settings</p>
            </div>
            </a>
        </section>
    </footer>
    <script src="scripts/general.js"></script>
    <script src="scripts/task-list/task-view-animate.js"></script>
</body>
</html>
